version: 1
applications:
  - appRoot: web
    frontend:
      phases:
        preBuild:
          commands:
            - npm ci
            # WHY: Prisma 7 generates the client from the schema at build time.
            # Without this, the build fails with missing module errors.
            - npx prisma generate
            # WHY: Syncs production DB schema with schema.prisma on every deploy.
            # Using db push (not migrate) because the project uses push workflow
            # and the migration history is out of sync. Safe for additive changes.
            - npx prisma db push
        build:
          commands:
            # WHY: Amplify makes env vars available at build time but NOT at
            # SSR Lambda runtime. Writing them to .env.production ensures
            # Next.js standalone bundles them into the server output.
            - env | grep -E '^(DATABASE_URL|NEXTAUTH_SECRET|NEXTAUTH_URL|GOOGLE_CLIENT_ID|GOOGLE_CLIENT_SECRET)=' > .env.production
            - npm run build
      artifacts:
        baseDirectory: .next
        files:
          - '**/*'
      cache:
        paths:
          - node_modules/**/*
          - .next/cache/**/*
